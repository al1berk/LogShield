version: "3.8"

networks:
  log4j-lab:
    driver: bridge

services:
  # ── Vulnerable Log4j 2.14.1 Java HTTP server ────────────────────────────────
  victim-app:
    build:
      context: .
      dockerfile: Dockerfile.victim
    container_name: victim-app
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - log4j-lab
    labels:
      - "project=log4shell-bilstm"
    restart: unless-stopped

